<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <title>Product List With Cart</title>
</head>
<body>
    <header>
        <h1>Dessert</h1>
    </header>

    <main>
        <section>
            <div class="content">
                <div class="picture-button">
                    <img src="images/food1.jpeg" alt="product.jpg">
                    <div>
                        <button><i class="bi bi-cart-plus"></i> Add To Cart</button>
                    </div>
                    <div class="product-quantity-button">
                        <button><i class="bi bi-dash-circle"></i><span id="quantity">0</span><i class="bi bi-plus-circle"></i></button>
                    </div>
                </div>
                <div class="product-information">
                    <h4>Waffle</h4>
                    <h3>Waffle With Berries</h3>
                    <h3 class="price">$6.50</h3>
                </div>
            </div>
            <div class="content">
                <div class="picture-button">
                    <img src="images/food1.jpeg" alt="product.jpg">
                    <div>
                        <button><i class="bi bi-cart-plus"></i> Add To Cart</button>
                    </div>
                    <div class="product-quantity-button">
                        <button><i class="bi bi-dash-circle"></i><span id="quantity">0</span><i class="bi bi-plus-circle"></i></button>
                    </div>
                </div>
                <div class="product-information">
                    <h4>Waffle</h4>
                    <h3>Waffle With Berries</h3>
                    <h3 class="price">$6.50</h3>
                </div>
            </div>
            <div class="content">
                <div class="picture-button">
                    <img src="images/food1.jpeg" alt="product.jpg">
                    <div>
                        <button><i class="bi bi-cart-plus"></i> Add To Cart</button>
                    </div>
                    <div class="product-quantity-button">
                        <button><i class="bi bi-dash-circle"></i><span id="quantity">0</span><i class="bi bi-plus-circle"></i></button>
                    </div>
                </div>
                <div class="product-information">
                    <h4>Waffle</h4>
                    <h3>Waffle With Berries</h3>
                    <h3 class="price">$6.50</h3>
                </div>
            </div>
            <div class="order-section">
                <h2>Your Cart (0)</h2>
                <div>
                    <div>
                        <div class="order-cart">
                            <div class="order-info">
                                <h4>Waffle With Berries</h4>
                                <span style="color: orangered; font-weight: bold;">4x</span>
                                <span>@$6.50</span>
                                <span style="font-weight: 600;">$28.00</span>
                            </div>
                            <div>
                                <i class="bi bi-x-circle"></i>
                            </div>
                        </div>
                        <hr>
                    </div>
                </div>
                <div class="order-total">
                    <span class="text-total">Order Total</span>
                    <span class="total">$0</span>
                </div>
                <div class="carbon-info">
                    <p>This is a<span> carbon-neutral </span>delivery</p>
                </div>
                <button>Confirm Order</button>
            </div>
        </section>
    </main>

    <script src="app.js"></script>
</body>
</html>
