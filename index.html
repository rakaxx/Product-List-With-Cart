<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <title>Product List With Cart</title>
</head>
<body>
    <header>
        <h1>Dessert</h1>
    </header>

    <main>
        <section >
            <div class="js-product-section">
                
            </div>
            <div class="order-section">
                <h2>Your Cart (0)</h2>
                <div>
                    <div>
                        <div class="order-cart">
                            <div class="order-info">
                                <h4>Waffle With Berries</h4>
                                <span style="color: orangered; font-weight: bold;">4x</span>
                                <span>@$6.50</span>
                                <span style="font-weight: 600;">$28.00</span>
                            </div>
                            <div>
                                <i class="bi bi-x-circle"></i>
                            </div>
                        </div>
                        <hr>
                    </div>
                </div>
                <div class="order-total">
                    <span class="text-total">Order Total</span>
                    <span class="total">$0</span>
                </div>
                <div class="carbon-info">
                    <p>This is a<span> carbon-neutral </span>delivery</p>
                </div>
                <button>Confirm Order</button>
            </div>
        </section>
    </main>


    <script src="data/products.js"></script>
    <script src="app.js"></script>
</body>
</html>
